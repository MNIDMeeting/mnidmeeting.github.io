<header class="site-header">
  <div class="container site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-title">MNID 2026 <span class="site-title__sub">/ Madison, WI</span></a>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        {% for item in site.nav %}
        <li>
          <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="is-active"{% endif %}>{{ item.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
